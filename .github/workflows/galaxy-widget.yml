name: Refresh galaxy widget

on:
  schedule:
    # Mondays 06:00 UTC; the README embed updates itself weekly.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  widget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Generate the animated SVG
        run: npm run widget
        env:
          GALAXY_LOGIN: ${{ github.repository_owner }}
          # The ephemeral Actions token; only used to raise API rate limits.
          GITHUB_TOKEN: ${{ github.token }}

      - name: Snapshot a PNG of the live site
        run: |
          google-chrome --headless=new --no-sandbox --hide-scrollbars \
            --window-size=1280,640 --virtual-time-budget=20000 \
            --screenshot=widget-out/galaxy.png \
            "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/?u=${{ github.repository_owner }}&snap=1"

      - name: Publish to the galaxy-image branch
        run: |
          cd widget-out
          rm -f generate-svg.mjs
          git init -b galaxy-image
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add galaxy.svg galaxy.png
          git commit -m "Refresh galaxy widget"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" galaxy-image
